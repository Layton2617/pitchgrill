cell: gr:moat-defensibility:seed
type: grilling
wedge: general
items:
- id: what-stops-incumbent-cloning
  theme: moat-defensibility
  stage:
  - seed
  wedge: general
  question: If Google/Salesforce/your largest incumbent decides to build this next
    quarter, what specifically stops them — and why haven't they already?
  strong_answer: Names the incumbent's structural disincentive, not just 'we move
    faster.' Cites a concrete reason it's a non-priority for them (channel conflict,
    cannibalizes a high-margin line, regulatory exposure, sits below their minimum-deal-size
    threshold, requires a data asset or workflow they don't touch). Frames the moat
    as something that compounds while they hesitate (proprietary data loop, integration
    depth into a workflow they don't own, a wedge into a segment they actively avoid).
    Acknowledges they COULD build a v1 and explains why v1 wouldn't win.
  weak_answer: '''We''re faster / more focused / have better UX'' or ''big companies
    can''t innovate.'' Treats execution speed as a moat. Assumes the incumbent is
    asleep rather than rationally choosing not to play. No structural reason — just
    confidence.'
  sources:
  - https://www.ycombinator.com/library
  - https://a16z.com
  - https://www.firstround.com
- id: first-customer-switching-cost
  theme: moat-defensibility
  stage:
  - seed
  wedge: general
  question: Walk me through what it would take one of your current customers to rip
    you out and switch to a competitor. Be concrete.
  strong_answer: 'Describes real, mounting switching costs that grow with usage: accumulated
    proprietary data/config, deep integrations into the customer''s stack, workflows
    multiple teams now depend on, retraining cost, historical records that live only
    in the product. Ideally cites an actual instance where a customer evaluated leaving
    and stayed, with the reason. Distinguishes ''painful to switch'' from ''nice to
    have.'''
  weak_answer: '''They love us'' / ''our NPS is high'' / ''we have a contract.'' Confuses
    satisfaction or a lock-in clause with structural stickiness. Admits a customer
    could export their data and be running on a competitor in a week, but waves it
    off.'
  sources:
  - https://www.firstround.com
  - https://www.sequoiacap.com
  - https://www.bvp.com
- id: moat-source-honest
  theme: moat-defensibility
  stage:
  - seed
  wedge: general
  question: Which of the classic moats is yours — network effects, switching costs,
    economies of scale, brand, or proprietary tech/data — and which are you pretending
    to have?
  strong_answer: Picks ONE primary moat that actually applies today (or is credibly
    forming) and explains the mechanism specifically. Honestly disclaims the ones
    that don't apply yet. Shows self-awareness that at seed the moat is usually nascent
    and the real bet is on a specific compounding loop they can point to early evidence
    of.
  weak_answer: Claims three or four moats at once ('network effects AND data AND brand
    AND switching costs'). Uses 'network effects' loosely for a product with no actual
    cross-user value. The more moats claimed, the less credible — signals the founder
    is reciting the vocabulary, not reasoning about the business.
  sources:
  - https://a16z.com
  - https://www.nfx.com
  - https://www.sequoiacap.com
- id: data-moat-reality
  theme: moat-defensibility
  stage:
  - seed
  wedge: general
  question: You say you have a data moat. How much data does it take before your product
    is meaningfully better — and is that data actually proprietary, or could a competitor
    buy/scrape/synthesize it?
  strong_answer: 'Quantifies the data advantage: how performance improves with data
    volume, and where the curve flattens. Explains why the data is hard to replicate
    — it''s generated by a proprietary user action/workflow, not available for purchase
    or scraping. Notes whether the data compounds (more usage -> better product ->
    more usage) or is a one-time collection any funded competitor could match. With
    LLMs commoditizing many tasks, articulates why their data still confers durable
    advantage rather than being a thin wrapper.'
  weak_answer: '''We''ll have tons of data once we scale.'' Future data as a present
    moat. Can''t say how much data is needed or whether the curve flattens early.
    The data turns out to be public, purchasable, or synthesizable with a foundation
    model — i.e., not a moat at all.'
  sources:
  - https://a16z.com
  - https://www.bvp.com
  - https://www.ycombinator.com/library
- id: network-effect-mechanism
  theme: moat-defensibility
  stage:
  - seed
  wedge: general
  question: 'If you''re claiming network effects, show me the mechanism: how does
    each additional user make the product more valuable to existing users — and at
    what point does it become self-reinforcing?'
  strong_answer: 'Names the specific type (direct, cross-side/marketplace, data, or
    social) and the exact value-transfer between users. Identifies the critical-mass
    threshold and where they are relative to it. Shows early proof: cohort retention
    improving as density grows in a geography/vertical, or organic invites. Honest
    that below critical mass the network effect is a liability (cold-start), and explains
    the go-to-market that solves the cold-start (atomic network / single dense segment
    first).'
  weak_answer: '''More users means more brand awareness / more revenue / more feedback.''
    That''s scale, not a network effect — it doesn''t make the product better for
    existing users. No threshold, no atomic-network plan. Calls a SaaS tool with no
    inter-user value a ''network effects business.'''
  sources:
  - https://www.nfx.com
  - https://a16z.com
  - https://www.firstround.com
- id: two-year-head-start
  theme: moat-defensibility
  stage:
  - seed
  wedge: general
  question: Right now your only real moat is a head start. How long is it, what are
    you using it to build that's durable, and what happens when it runs out?
  strong_answer: Accepts the premise honestly — at seed, the moat usually IS execution
    speed plus a head start. Then explains what compounding asset the head start is
    being converted into before competitors arrive (data loop, integration lock-in,
    category brand, supply-side relationships, a standard others must interoperate
    with). Has a clear thesis on the window length and what milestone closes it.
  weak_answer: Insists the head start itself is the moat and that being first is permanent.
    No plan to convert time into a durable asset. Ignores that fast-followers often
    win, especially when the first mover educates the market and a better-funded competitor
    copies the validated playbook.
  sources:
  - https://www.ycombinator.com/library
  - https://www.firstround.com
  - https://www.sequoiacap.com
- id: low-margin-low-defensibility-segment
  theme: moat-defensibility
  stage:
  - seed
  wedge: general
  question: Your wedge is a thin feature. What's your path from this beachhead to
    something a competitor can't trivially replicate — and why won't this become a
    price-competed commodity?
  strong_answer: 'Articulates a credible ''wedge-then-platform'' sequence: the thin
    feature wins the initial relationship, and there''s a specific expansion into
    a workflow/system-of-record that becomes hard to displace. Explains the pricing
    power source (mission-critical workflow, integration depth, data) so it doesn''t
    degrade into a feature war. Cites early expansion signal (net revenue retention
    trend, multi-product adoption) even if small.'
  weak_answer: '''We''ll add more features over time.'' A roadmap of features is not
    a moat — each is independently cloneable. No system-of-record ambition, no pricing-power
    thesis. Risks becoming a checkbox feature an incumbent bundles for free, or a
    race to the bottom on price.'
  sources:
  - https://a16z.com
  - https://www.bvp.com
  - https://www.ycombinator.com/library
- id: open-source-or-foundation-model-substitution
  theme: moat-defensibility
  stage:
  - seed
  wedge: general
  question: How much of your core value is just a wrapper around a foundation model
    or an open-source project that anyone can call — and what's left of you if that
    underlying capability gets 10x cheaper or gets absorbed into the platform?
  strong_answer: Clearly separates the commoditizing layer (the model/OSS) from the
    proprietary layer they own (workflow, proprietary data, distribution, integrations,
    domain-specific evals, the last-mile that makes it production-grade for a specific
    buyer). Argues that cheaper/better underlying capability is a tailwind that expands
    their market, because their moat lives above the model. Names what survives if
    the model layer collapses to zero cost.
  weak_answer: '''Our prompts/fine-tuning are our edge,'' or no clear answer at all.
    The entire product is API calls plus UI; a model-provider feature release or an
    OSS repo could replicate it. Treats access to a frontier model as proprietary
    when it''s available to every competitor.'
  sources:
  - https://a16z.com
  - https://www.sequoiacap.com
  - https://www.bvp.com
- id: competitor-with-distribution
  theme: moat-defensibility
  stage:
  - seed
  wedge: general
  question: Suppose a player who already owns your customer's attention adds your
    feature for free. You're a standalone purchase competing with a default. Why do
    you still win?
  strong_answer: Acknowledges distribution beats product more often than founders
    admit. Argues either (a) the feature is so core to the buyer that 'free but mediocre
    and bundled' loses to 'paid but best-in-class,' with evidence buyers pay for the
    category, or (b) they have their own distribution wedge (a channel, partnership,
    or community the incumbent can't easily match). Identifies the specific buyer
    who will not accept the bundled version and why.
  weak_answer: '''Ours is better.'' Underestimates the power of being the default.
    No distribution answer of their own. Assumes buyers will seek out and pay for
    a superior point solution when a good-enough version ships free inside a tool
    they already use daily.'
  sources:
  - https://www.firstround.com
  - https://a16z.com
  - https://www.ycombinator.com/library
