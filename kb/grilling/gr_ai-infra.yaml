cell: gr:ai-infra
type: grilling
wedge: general
items:
- id: ai-infra-1
  sector: ai-infra
  theme: Gross margin reality under inference economics
  question: What's your gross margin per inference request today, and how does it
    move as you scale — does it improve or does your COGS scale linearly with usage?
  strong_answer: Founder gives current blended gross margin (e.g. industry-typical
    software-style infra targets 60-80%, but many inference-heavy AI-infra businesses
    sit at 30-50% early). They distinguish margin on cached/repeat workloads vs cold
    inference, name the specific cost drivers (GPU-hours, token throughput, egress,
    vector store reads), and show a concrete path to margin expansion via batching,
    quantization, KV-cache reuse, speculative decoding, or routing cheaper models
    for easy queries. They know their margin floor is set by underlying compute and
    they're honest that they don't control GPU prices.
  weak_answer: Claims '80% SaaS margins' without acknowledging COGS is GPU compute
    they resell, or says 'margins improve with scale' with no mechanism — when in
    reality compute cost scales nearly linearly with usage. Conflates the cloud provider's
    negotiated discount with structural margin. Can't separate compute COGS from the
    rest.
  strong_answer_extra: ''
  sources:
  - a16z.com
  stage:
  - pre-seed
